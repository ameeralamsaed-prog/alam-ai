<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alam AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&family=Google+Sans+Text:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg-primary:   #0d0d0d;
      --bg-sidebar:   #141414;
      --bg-surface:   #1c1c1e;
      --bg-input:     #1e1e20;
      --border:       #2a2a2e;
      --text-primary: #e8eaed;
      --text-secondary:#9aa0a6;
      --text-muted:   #5f6368;
      --accent-blue:  #4f8ef7;
      --accent-purple:#a78bfa;
      --accent-teal:  #34d399;
      --glow-blue:    rgba(79,142,247,0.18);
      --glow-purple:  rgba(167,139,250,0.14);
      --pill-bg:      #1e1e22;
      --hover-surface:#252528;
      --send-btn:     #4f8ef7;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Google Sans Text', 'Google Sans', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      width: 72px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
      gap: 6px;
      flex-shrink: 0;
      transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
      overflow: hidden;
      z-index: 10;
    }
    .sidebar.expanded { width: 260px; align-items: flex-start; padding: 16px 12px; }

    .sidebar-logo {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; width: 100%; cursor: pointer;
      border-radius: 12px; margin-bottom: 8px;
    }

    .sidebar-logo-text {
      font-family: 'Google Sans', sans-serif;
      font-size: 17px; font-weight: 600;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      white-space: nowrap; opacity: 0; transition: opacity 0.2s;
    }
    .sidebar.expanded .sidebar-logo-text { opacity: 1; }

    .new-chat-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 24px; cursor: pointer;
      background: var(--hover-surface); border: 1px solid var(--border);
      color: var(--text-primary); font-size: 14px; font-weight: 500;
      font-family: 'Google Sans', sans-serif;
      transition: background 0.2s, border-color 0.2s;
      white-space: nowrap; width: 100%; overflow: hidden;
    }
    .new-chat-btn:hover { background: #2c2c30; border-color: #3a3a40; }
    .new-chat-btn .btn-text { opacity: 0; transition: opacity 0.2s; margin-left: 8px; }
    .sidebar.expanded .new-chat-btn .btn-text { opacity: 1; }

    .sidebar-divider {
      width: calc(100% - 24px); height: 1px;
      background: var(--border); margin: 8px 12px;
      flex-shrink: 0;
    }

    .sidebar-section-label {
      font-size: 11px; color: var(--text-muted); font-weight: 500;
      padding: 4px 14px; text-transform: uppercase; letter-spacing: 0.8px;
      opacity: 0; transition: opacity 0.2s; width: 100%;
    }
    .sidebar.expanded .sidebar-section-label { opacity: 1; }

    .sidebar-item {
      display: flex; align-items: center; gap: 12px;
      padding: 9px 12px; border-radius: 10px; cursor: pointer;
      color: var(--text-secondary); font-size: 13.5px; font-weight: 400;
      transition: background 0.15s, color 0.15s; width: 100%;
      white-space: nowrap; overflow: hidden;
    }
    .sidebar-item:hover { background: var(--hover-surface); color: var(--text-primary); }
    .sidebar-item.active { background: rgba(79,142,247,0.12); color: var(--accent-blue); }
    .sidebar-item .item-text { opacity: 0; transition: opacity 0.2s; }
    .sidebar.expanded .sidebar-item .item-text { opacity: 1; }

    .sidebar-bottom { margin-top: auto; width: 100%; display: flex; flex-direction: column; gap: 4px; }
    .avatar-btn { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 10px; cursor: pointer; transition: background 0.15s; width: 100%; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: white; flex-shrink: 0; }
    
    /* ─── MAIN AREA ─── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; flex-shrink: 0; }
    .menu-btn { width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); transition: background 0.15s; }
    .menu-btn:hover { background: var(--hover-surface); }

    /* ─── CHAT AREA ─── */
    .chat-area { flex: 1; overflow-y: auto; padding: 0 24px 16px; display: flex; flex-direction: column; scroll-behavior: smooth; }
    .welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 40px 20px; text-align: center; animation: fadeUp 0.6s ease both; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

    .logo-glow { position: absolute; inset: -20px; background: radial-gradient(ellipse at center, rgba(79,142,247,0.22) 0%, rgba(167,139,250,0.14) 50%, transparent 70%); border-radius: 50%; pointer-events: none; animation: glowPulse 3s ease-in-out infinite; }
    @keyframes glowPulse { 0%,100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.12); } }

    .welcome h1 { font-family: 'Google Sans', sans-serif; font-size: clamp(28px, 5vw, 42px); font-weight: 600; background: linear-gradient(135deg, #e8eaed 10%, var(--accent-blue) 50%, var(--accent-purple) 90%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.2; letter-spacing: -0.5px; }

    /* ─── MESSAGES ─── */
    .message-group { max-width: 760px; width: 100%; margin: 12px auto; animation: fadeUp 0.35s ease both; }
    .msg-user { display: flex; justify-content: flex-end; margin-bottom: 20px; }
    .msg-user-bubble { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 20px 20px 4px 20px; padding: 12px 18px; font-size: 15px; line-height: 1.6; max-width: 70%; color: var(--text-primary); }
    .msg-ai { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 8px; }
    .msg-ai-avatar { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); display: flex; align-items: center; justify-content: center
